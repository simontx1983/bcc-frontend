name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node:
    name: Frontend — tsc · lint · vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npx next lint

      - name: Unit tests
        run: npx vitest run

      # Production build is validated by Vercel on every push + PR preview
      # deploy (the optional native-binary deps make `next build` flaky to
      # reproduce on a clean GH runner from a Windows-generated lockfile).
